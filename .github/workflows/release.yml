name: Release

# Builds the desktop app for macOS, Linux, and Windows and attaches the
# binaries to a GitHub Release. Triggered by either pushing a tag like
# v1.0.0 OR by running the workflow manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Skip to dry-run without publishing.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: dist:mac
          - os: ubuntu-latest
            target: dist:linux
          - os: windows-latest
            target: dist:win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code-signing in CI: contributors / forks usually don't
          # have an Apple Developer cert. The DMG will be unsigned but usable.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
